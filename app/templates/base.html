<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Carteira de Ações{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/custom.css">
    <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/carteira/">
            <i class="bi bi-graph-up-arrow"></i> Carteira
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link {% if request.url.path.startswith('/carteira') %}active{% endif %}"
                       href="/carteira/">
                        <i class="bi bi-speedometer2"></i> Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.url.path.startswith('/ativos') %}active{% endif %}"
                       href="/ativos/">
                        <i class="bi bi-building"></i> Ativos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.url.path.startswith('/transacoes') %}active{% endif %}"
                       href="/transacoes/">
                        <i class="bi bi-arrow-left-right"></i> Transações
                    </a>
                </li>
            </ul>
            <span class="navbar-text text-secondary small">
                <i class="bi bi-circle-fill text-success" style="font-size:0.5rem;"></i>
                FastAPI + SQLite
            </span>
        </div>
    </div>
</nav>

<div class="container-fluid py-4 px-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
