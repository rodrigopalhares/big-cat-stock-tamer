<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Proventos')}"></head>
<body>
<nav th:replace="~{base :: navbar}"></nav>

<div class="container-fluid py-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0"><i class="bi bi-cash-coin"></i> Proventos</h2>
        <button type="button" class="btn btn-outline-success" data-bs-toggle="modal" data-bs-target="#csvDivImportModal">
            <i class="bi bi-filetype-csv"></i> Importar CSV
        </button>
    </div>

    <div class="row g-4">
        <!-- New dividend form -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-semibold">
                    <i class="bi bi-plus-circle"></i> Novo Provento
                </div>
                <div class="card-body">
                    <form method="post" action="/dividends/new">
                        <div class="mb-3">
                            <label class="form-label">Ticker <span class="text-danger">*</span></label>
                            <input type="text" name="ticker" class="form-control" list="ticker-list"
                                placeholder="Ex: PETR4, MXRF11" autocomplete="off" required
                                oninput="this.value = this.value.toUpperCase()" hx-get="/dividends/ticker-info"
                                hx-trigger="change, keyup changed delay:600ms" hx-target="#ticker-preview"
                                hx-include="this">
                            <datalist id="ticker-list">
                                <option th:each="a : ${assets}" th:value="${a['ticker']}" th:text="${a['name']}">
                                </option>
                            </datalist>
                            <div id="ticker-preview" class="mt-2"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tipo <span class="text-danger">*</span></label>
                            <select name="type" class="form-select" required>
                                <option th:each="t : ${dividendTypes}" th:value="${t}" th:text="${t}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Moeda</label>
                            <select name="currency" id="newDivCurrency" class="form-select">
                                <option value="BRL" selected>BRL</option>
                                <option value="USD">USD</option>
                            </select>
                        </div>
                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label class="form-label">Valor Bruto <span class="text-danger">*</span></label>
                                <input type="number" name="total_amount" class="form-control" step="0.01"
                                    min="0.01" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label">IR Retido</label>
                                <input type="number" name="tax_withheld" class="form-control" step="0.01"
                                    min="0" value="0">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Data <span class="text-danger">*</span></label>
                            <input type="date" name="date" class="form-control" th:value="${today}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Notas</label>
                            <textarea name="notes" class="form-control" rows="2" placeholder="Opcional"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-check-lg"></i> Registrar
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Dividend history -->
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <span class="fw-semibold">
                        Histórico
                        <span class="badge bg-secondary ms-1" th:text="${#lists.size(dividends)}"></span>
                    </span>
                    <div class="d-flex align-items-center gap-2">
                        <form method="get" action="/dividends/" class="d-flex align-items-center gap-2 mb-0">
                            <select name="ticker" class="form-select form-select-sm" style="width:auto" onchange="this.form.submit()">
                                <option value="">Ativo: Todos</option>
                                <option th:each="a : ${assets}" th:value="${a['ticker']}" th:text="${a['ticker']}"
                                    th:selected="${a['ticker'] == selectedTicker}"></option>
                            </select>
                            <select name="type" class="form-select form-select-sm" style="width:auto" onchange="this.form.submit()">
                                <option value="">Tipo: Todos</option>
                                <option th:each="t : ${dividendTypes}" th:value="${t}" th:text="${t}"
                                    th:selected="${t == selectedType}"></option>
                            </select>
                        </form>
                        <a th:if="${selectedTicker != null or selectedType != ''}" href="/dividends/"
                            class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-x-lg"></i>
                        </a>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div th:if="${!dividends.isEmpty()}" class="table-responsive">
                        <table class="table table-hover mb-0 align-middle small">
                            <thead class="table-light">
                                <tr>
                                    <th>Data</th>
                                    <th>Ativo</th>
                                    <th>Tipo</th>
                                    <th class="text-end">Valor Bruto</th>
                                    <th class="text-end">IR Retido</th>
                                    <th class="text-end">Valor Líquido</th>
                                    <th class="text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="d : ${dividends}">
                                    <td th:text="${#temporals.format(d.date, 'dd/MM/yyyy')}"></td>
                                    <td class="fw-bold">
                                        <a th:href="'/assets/' + ${d.assetTicker}" class="text-decoration-none" th:text="${d.assetTicker}"></a>
                                    </td>
                                    <td>
                                        <span th:replace="~{fragments/badge :: dividendBadge(${d.type})}"></span>
                                    </td>
                                    <td class="text-end">
                                        <span th:if="${d.currency != 'BRL'}" class="text-muted small" th:text="${d.currency + ' '}"></span>
                                        <span th:text="${(d.currency == 'BRL' ? 'R$ ' : '') + #numbers.formatDecimal(d.totalAmount, 1, 2)}"></span>
                                        <div th:if="${d.currency != 'BRL'}" class="text-muted small">R$ <span th:text="${#numbers.formatDecimal(d.totalAmountBrl, 1, 2)}"></span></div>
                                    </td>
                                    <td class="text-end text-muted">
                                        <span th:text="${(d.currency == 'BRL' ? 'R$ ' : '') + #numbers.formatDecimal(d.taxWithheld, 1, 2)}"></span>
                                        <div th:if="${d.currency != 'BRL'}" class="small">R$ <span th:text="${#numbers.formatDecimal(d.taxWithheldBrl, 1, 2)}"></span></div>
                                    </td>
                                    <td class="text-end fw-semibold text-success">
                                        <span th:text="${(d.currency == 'BRL' ? 'R$ ' : '') + #numbers.formatDecimal(d.netAmount, 1, 2)}"></span>
                                        <div th:if="${d.currency != 'BRL'}" class="small">R$ <span th:text="${#numbers.formatDecimal(d.netAmountBrl, 1, 2)}"></span></div>
                                    </td>
                                    <td class="text-center text-nowrap">
                                        <button type="button" class="btn btn-sm btn-outline-primary border-0"
                                            title="Editar"
                                            th:attr="data-div-id=${d.id},
                                                     data-div-type=${d.type},
                                                     data-div-total-amount=${d.totalAmount},
                                                     data-div-tax-withheld=${d.taxWithheld},
                                                     data-div-date=${d.date},
                                                     data-div-currency=${d.currency},
                                                     data-div-notes=${d.notes != null ? d.notes : ''}"
                                            onclick="openEditDivModal(this)">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <form method="post" th:action="'/dividends/' + ${d.id} + '/delete'"
                                            class="d-inline" onsubmit="return confirm('Excluir este provento?')">
                                            <button type="submit" class="btn btn-sm btn-outline-danger border-0">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:if="${dividends.isEmpty()}" class="text-center py-5 text-muted">
                        <i class="bi bi-inbox fs-1"></i>
                        <p class="mt-2">Nenhum provento registrado.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- CSV Import Modal -->
<div class="modal fade" id="csvDivImportModal" tabindex="-1">
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-filetype-csv"></i> Importar Proventos via CSV</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body d-flex flex-column overflow-hidden">
                <div class="flex-shrink-0 mb-3">
                    <label class="form-label">Cole os dados CSV (separado por tab)</label>
                    <textarea id="divCsvTextarea" name="csv" class="form-control font-monospace" rows="6"
                        placeholder="PETR4&#9;01/03/2026&#9;DIVIDENDO&#9;1,50&#9;0,00&#9;BRL&#9;XP&#9;&#9;Teste"></textarea>
                    <div class="form-text">
                        Colunas: ativo | data | tipo | valor | irrf | moeda | corretora | [ignorar] | observação
                    </div>
                </div>
                <div class="flex-shrink-0 mb-3">
                    <button type="button" class="btn btn-primary"
                        hx-post="/dividends/parse-csv"
                        hx-include="#divCsvTextarea"
                        hx-target="#csv-div-preview-area"
                        hx-indicator="#divCsvSpinner">
                        <i class="bi bi-search"></i> Processar
                    </button>
                    <span id="divCsvSpinner" class="htmx-indicator">
                        <span class="spinner-border spinner-border-sm"></span> Processando...
                    </span>
                </div>
                <div id="csv-div-preview-area" class="flex-grow-1 overflow-auto min-h-0"></div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Dividend Modal -->
<div class="modal fade" id="editDivModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-pencil"></i> Editar Provento</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="editDivForm" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Tipo</label>
                        <select id="editDivType" name="type" class="form-select" required>
                            <option th:each="t : ${dividendTypes}" th:value="${t}" th:text="${t}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Moeda</label>
                        <select id="editDivCurrency" name="currency" class="form-select">
                            <option value="BRL">BRL</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">Valor Bruto</label>
                            <input type="number" id="editDivTotalAmount" name="total_amount" class="form-control" step="0.01" min="0.01" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">IR Retido</label>
                            <input type="number" id="editDivTaxWithheld" name="tax_withheld" class="form-control" step="0.01" min="0" value="0">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Data</label>
                        <input type="date" id="editDivDate" name="date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Notas</label>
                        <textarea id="editDivNotes" name="notes" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block th:replace="~{base :: scripts}"></th:block>
<script src="/js/dividends.js"></script>
<script>
function openEditDivModal(btn, returnTo) {
    document.getElementById('editDivForm').action = '/dividends/' + btn.dataset.divId + '/edit';
    for (var opt of document.getElementById('editDivType').options)
        opt.selected = opt.value === btn.dataset.divType;
    document.getElementById('editDivTotalAmount').value = btn.dataset.divTotalAmount;
    document.getElementById('editDivTaxWithheld').value = btn.dataset.divTaxWithheld;
    document.getElementById('editDivDate').value = btn.dataset.divDate;
    document.getElementById('editDivCurrency').value = btn.dataset.divCurrency || 'BRL';
    document.getElementById('editDivNotes').value = btn.dataset.divNotes;
    var existing = document.getElementById('editDivReturnTo');
    if (existing) existing.remove();
    if (returnTo) {
        var input = document.createElement('input');
        input.type = 'hidden'; input.name = 'returnTo'; input.id = 'editDivReturnTo'; input.value = returnTo;
        document.getElementById('editDivForm').appendChild(input);
    }
    new bootstrap.Modal(document.getElementById('editDivModal')).show();
}
</script>
</body>
</html>
