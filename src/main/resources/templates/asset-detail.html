<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Ativo — ' + ${asset.ticker})}"></head>
<body>
<nav th:replace="~{base :: navbar}"></nav>

<div class="container-fluid py-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">
            <a href="/assets/" class="text-decoration-none text-muted me-2"><i class="bi bi-arrow-left"></i></a>
            <i class="bi bi-building"></i>
            <span th:text="${asset.ticker}"></span>
            <small class="text-muted" th:if="${asset.name != null}" th:text="' — ' + ${asset.name}"></small>
        </h2>
    </div>

    <div class="row g-4">
        <!-- Left column: Asset info + edit form -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-semibold">
                    <i class="bi bi-pencil"></i> Dados do Ativo
                </div>
                <div class="card-body">
                    <form method="post" th:action="'/assets/' + ${asset.ticker} + '/edit'">
                        <input type="hidden" name="returnTo" th:value="'/assets/' + ${asset.ticker}">
                        <div class="mb-3">
                            <label class="form-label">Ticker</label>
                            <input type="text" class="form-control" th:value="${asset.ticker}" readonly disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" name="name" class="form-control" placeholder="Ex: Petrobras PN"
                                   th:value="${asset.name}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tipo</label>
                            <select name="type" class="form-select">
                                <option th:each="t : ${assetTypes}" th:value="${t}" th:text="${t}"
                                        th:selected="${t == asset.type}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">YF Ticker <span class="text-muted small">(Yahoo Finance)</span></label>
                            <input type="text" name="yf_ticker" class="form-control" placeholder="Ex: PETR4.SA"
                                   th:value="${asset.yfTicker}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Moeda</label>
                            <select name="currency" class="form-select">
                                <option value="BRL" th:selected="${asset.currency == 'BRL'}">BRL — Real</option>
                                <option value="USD" th:selected="${asset.currency == 'USD'}">USD — Dólar</option>
                            </select>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="delistedCheck" name="delisted" value="on"
                                   th:checked="${asset.delisted}">
                            <label class="form-check-label" for="delistedCheck">Deslistado</label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-check-lg"></i> Salvar
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Right column: Transactions + Dividends -->
        <div class="col-lg-8">
            <!-- Transactions card -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <span class="fw-semibold">
                        <i class="bi bi-arrow-left-right"></i> Transações
                        <span class="badge bg-secondary ms-1" th:text="${#lists.size(transactions)}"></span>
                    </span>
                    <a th:href="'/transactions/?ticker=' + ${asset.ticker}" class="btn btn-sm btn-primary">
                        <i class="bi bi-plus-lg"></i> Nova
                    </a>
                </div>
                <div class="card-body p-0">
                    <div th:if="${!transactions.isEmpty()}" class="table-responsive">
                        <table class="table table-hover mb-0 align-middle small">
                            <thead class="table-light">
                                <tr>
                                    <th>Data</th>
                                    <th>Tipo</th>
                                    <th class="text-end">Qtd</th>
                                    <th class="text-end">Preço</th>
                                    <th class="text-end">Taxas</th>
                                    <th class="text-end">Total</th>
                                    <th>Corretora</th>
                                    <th class="text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="t : ${transactions}">
                                    <td th:text="${#temporals.format(t.date, 'dd/MM/yyyy')}"></td>
                                    <td>
                                        <span class="badge"
                                            th:classappend="${t.type == 'BUY'} ? 'bg-success' : 'bg-danger'"
                                            th:text="${t.type == 'BUY'} ? 'Compra' : 'Venda'"></span>
                                    </td>
                                    <td class="text-end" th:text="${#numbers.formatDecimal(t.quantity, 1, 4)}"></td>
                                    <td class="text-end">
                                        <span th:text="${(t.currency == 'BRL' ? 'R$ ' : t.currency + ' ') + #numbers.formatDecimal(t.price, 1, 2)}"></span>
                                        <div th:if="${t.currency != 'BRL'}" class="text-muted small">R$ <span th:text="${#numbers.formatDecimal(t.priceBrl, 1, 2)}"></span></div>
                                    </td>
                                    <td class="text-end text-muted">
                                        <span th:text="${(t.currency == 'BRL' ? 'R$ ' : t.currency + ' ') + #numbers.formatDecimal(t.fees, 1, 2)}"></span>
                                        <div th:if="${t.currency != 'BRL'}" class="small">R$ <span th:text="${#numbers.formatDecimal(t.feesBrl, 1, 2)}"></span></div>
                                    </td>
                                    <td class="text-end fw-semibold">
                                        <span th:text="${(t.currency == 'BRL' ? 'R$ ' : t.currency + ' ') + #numbers.formatDecimal(t.total, 1, 2)}"></span>
                                        <div th:if="${t.currency != 'BRL'}" class="text-muted small">R$ <span th:text="${#numbers.formatDecimal(t.totalBrl, 1, 2)}"></span></div>
                                    </td>
                                    <td class="text-muted" th:text="${t.broker != null ? t.broker : '—'}"></td>
                                    <td class="text-center text-nowrap">
                                        <button type="button" class="btn btn-sm btn-outline-primary border-0"
                                            title="Editar"
                                            th:attr="data-tx-id=${t.id},
                                                     data-tx-type=${t.type},
                                                     data-tx-quantity=${t.quantity},
                                                     data-tx-price=${t.price},
                                                     data-tx-fees=${t.fees},
                                                     data-tx-date=${t.date},
                                                     data-tx-currency=${t.currency},
                                                     data-tx-broker=${t.broker != null ? t.broker : ''},
                                                     data-tx-notes=${t.notes != null ? t.notes : ''},
                                                     data-return-to=${'/assets/' + asset.ticker}"
                                            onclick="openEditTxModal(this, this.dataset.returnTo)">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <form method="post" th:action="'/transactions/' + ${t.id} + '/delete'"
                                            class="d-inline" onsubmit="return confirm('Excluir esta transação?')">
                                            <input type="hidden" name="returnTo" th:value="'/assets/' + ${asset.ticker}">
                                            <button type="submit" class="btn btn-sm btn-outline-danger border-0" title="Excluir">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:if="${transactions.isEmpty()}" class="text-center py-4 text-muted">
                        <i class="bi bi-inbox fs-3"></i>
                        <p class="mt-2 mb-0">Nenhuma transação registrada.</p>
                    </div>
                </div>
            </div>

            <!-- Dividends card -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white d-flex justify-content-between align-items-center">
                    <span class="fw-semibold">
                        <i class="bi bi-cash-coin"></i> Proventos
                        <span class="badge bg-secondary ms-1" th:text="${#lists.size(dividends)}"></span>
                    </span>
                    <a th:href="'/dividends/?ticker=' + ${asset.ticker}" class="btn btn-sm btn-primary">
                        <i class="bi bi-plus-lg"></i> Novo
                    </a>
                </div>
                <div class="card-body p-0">
                    <div th:if="${!dividends.isEmpty()}" class="table-responsive">
                        <table class="table table-hover mb-0 align-middle small">
                            <thead class="table-light">
                                <tr>
                                    <th>Data</th>
                                    <th>Tipo</th>
                                    <th class="text-end">Valor Bruto</th>
                                    <th class="text-end">IR Retido</th>
                                    <th class="text-end">Valor Líquido</th>
                                    <th class="text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="d : ${dividends}">
                                    <td th:text="${#temporals.format(d.date, 'dd/MM/yyyy')}"></td>
                                    <td>
                                        <span th:replace="~{fragments/badge :: dividendBadge(${d.type})}"></span>
                                    </td>
                                    <td class="text-end">
                                        <span th:if="${d.currency != 'BRL'}" class="text-muted small" th:text="${d.currency + ' '}"></span>
                                        <span th:text="${(d.currency == 'BRL' ? 'R$ ' : '') + #numbers.formatDecimal(d.totalAmount, 1, 2)}"></span>
                                        <div th:if="${d.currency != 'BRL'}" class="text-muted small">R$ <span th:text="${#numbers.formatDecimal(d.totalAmountBrl, 1, 2)}"></span></div>
                                    </td>
                                    <td class="text-end text-muted">
                                        <span th:text="${(d.currency == 'BRL' ? 'R$ ' : '') + #numbers.formatDecimal(d.taxWithheld, 1, 2)}"></span>
                                        <div th:if="${d.currency != 'BRL'}" class="small">R$ <span th:text="${#numbers.formatDecimal(d.taxWithheldBrl, 1, 2)}"></span></div>
                                    </td>
                                    <td class="text-end fw-semibold text-success">
                                        <span th:text="${(d.currency == 'BRL' ? 'R$ ' : '') + #numbers.formatDecimal(d.netAmount, 1, 2)}"></span>
                                        <div th:if="${d.currency != 'BRL'}" class="small">R$ <span th:text="${#numbers.formatDecimal(d.netAmountBrl, 1, 2)}"></span></div>
                                    </td>
                                    <td class="text-center text-nowrap">
                                        <button type="button" class="btn btn-sm btn-outline-primary border-0"
                                            title="Editar"
                                            th:attr="data-div-id=${d.id},
                                                     data-div-type=${d.type},
                                                     data-div-total-amount=${d.totalAmount},
                                                     data-div-tax-withheld=${d.taxWithheld},
                                                     data-div-date=${d.date},
                                                     data-div-currency=${d.currency},
                                                     data-div-notes=${d.notes != null ? d.notes : ''},
                                                     data-return-to=${'/assets/' + asset.ticker}"
                                            onclick="openEditDivModal(this, this.dataset.returnTo)">
                                            <i class="bi bi-pencil"></i>
                                        </button>
                                        <form method="post" th:action="'/dividends/' + ${d.id} + '/delete'"
                                            class="d-inline" onsubmit="return confirm('Excluir este provento?')">
                                            <input type="hidden" name="returnTo" th:value="'/assets/' + ${asset.ticker}">
                                            <button type="submit" class="btn btn-sm btn-outline-danger border-0" title="Excluir">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:if="${dividends.isEmpty()}" class="text-center py-4 text-muted">
                        <i class="bi bi-inbox fs-3"></i>
                        <p class="mt-2 mb-0">Nenhum provento registrado.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Transaction Modal -->
<div class="modal fade" id="editTxModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-pencil"></i> Editar Transação</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="editTxForm" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Tipo</label>
                        <div class="btn-group w-100" role="group">
                            <input type="radio" class="btn-check" name="type" id="editTxTypeBuy" value="BUY">
                            <label class="btn btn-outline-success" for="editTxTypeBuy">
                                <i class="bi bi-arrow-down-circle"></i> Compra
                            </label>
                            <input type="radio" class="btn-check" name="type" id="editTxTypeSell" value="SELL">
                            <label class="btn btn-outline-danger" for="editTxTypeSell">
                                <i class="bi bi-arrow-up-circle"></i> Venda
                            </label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Moeda</label>
                        <select id="editTxCurrency" name="currency" class="form-select">
                            <option value="BRL">BRL</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">Quantidade</label>
                            <input type="number" id="editTxQty" name="quantity" class="form-control" step="0.0001" min="0.0001" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">Preço Unit.</label>
                            <input type="number" id="editTxPrice" name="price" class="form-control" step="0.0001" min="0" required>
                        </div>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">Taxas</label>
                            <input type="number" id="editTxFees" name="fees" class="form-control" step="0.01" min="0" value="0">
                        </div>
                        <div class="col-6">
                            <label class="form-label">Data</label>
                            <input type="date" id="editTxDate" name="date" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Corretora</label>
                        <input type="text" id="editTxBroker" name="broker" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Notas</label>
                        <textarea id="editTxNotes" name="notes" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Edit Dividend Modal -->
<div class="modal fade" id="editDivModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-pencil"></i> Editar Provento</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="editDivForm" method="post">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Tipo</label>
                        <select id="editDivType" name="type" class="form-select" required>
                            <option th:each="t : ${dividendTypes}" th:value="${t}" th:text="${t}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Moeda</label>
                        <select id="editDivCurrency" name="currency" class="form-select">
                            <option value="BRL">BRL</option>
                            <option value="USD">USD</option>
                        </select>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-6">
                            <label class="form-label">Valor Bruto</label>
                            <input type="number" id="editDivTotalAmount" name="total_amount" class="form-control" step="0.01" min="0.01" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label">IR Retido</label>
                            <input type="number" id="editDivTaxWithheld" name="tax_withheld" class="form-control" step="0.01" min="0" value="0">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Data</label>
                        <input type="date" id="editDivDate" name="date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Notas</label>
                        <textarea id="editDivNotes" name="notes" class="form-control" rows="2"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<th:block th:replace="~{base :: scripts}"></th:block>
<script>
function openEditTxModal(btn, returnTo) {
    document.getElementById('editTxForm').action = '/transactions/' + btn.dataset.txId + '/edit';
    document.getElementById('editTxTypeBuy').checked = btn.dataset.txType === 'BUY';
    document.getElementById('editTxTypeSell').checked = btn.dataset.txType === 'SELL';
    document.getElementById('editTxCurrency').value = btn.dataset.txCurrency || 'BRL';
    document.getElementById('editTxQty').value = btn.dataset.txQuantity;
    document.getElementById('editTxPrice').value = btn.dataset.txPrice;
    document.getElementById('editTxFees').value = btn.dataset.txFees;
    document.getElementById('editTxDate').value = btn.dataset.txDate;
    document.getElementById('editTxBroker').value = btn.dataset.txBroker;
    document.getElementById('editTxNotes').value = btn.dataset.txNotes;
    var existing = document.getElementById('editTxReturnTo');
    if (existing) existing.remove();
    if (returnTo) {
        var input = document.createElement('input');
        input.type = 'hidden'; input.name = 'returnTo'; input.id = 'editTxReturnTo'; input.value = returnTo;
        document.getElementById('editTxForm').appendChild(input);
    }
    new bootstrap.Modal(document.getElementById('editTxModal')).show();
}
function openEditDivModal(btn, returnTo) {
    document.getElementById('editDivForm').action = '/dividends/' + btn.dataset.divId + '/edit';
    for (var opt of document.getElementById('editDivType').options)
        opt.selected = opt.value === btn.dataset.divType;
    document.getElementById('editDivTotalAmount').value = btn.dataset.divTotalAmount;
    document.getElementById('editDivTaxWithheld').value = btn.dataset.divTaxWithheld;
    document.getElementById('editDivDate').value = btn.dataset.divDate;
    document.getElementById('editDivCurrency').value = btn.dataset.divCurrency || 'BRL';
    document.getElementById('editDivNotes').value = btn.dataset.divNotes;
    var existing = document.getElementById('editDivReturnTo');
    if (existing) existing.remove();
    if (returnTo) {
        var input = document.createElement('input');
        input.type = 'hidden'; input.name = 'returnTo'; input.id = 'editDivReturnTo'; input.value = returnTo;
        document.getElementById('editDivForm').appendChild(input);
    }
    new bootstrap.Modal(document.getElementById('editDivModal')).show();
}
</script>
</body>
</html>
