<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{base :: head('Evolução — Carteira')}"></head>
<body>
<nav th:replace="~{base :: navbar}"></nav>

<div class="container-fluid py-4 px-4">
<h2 class="mb-4"><i class="bi bi-graph-up"></i> Evolução Patrimonial</h2>

<div class="mb-3">
    <form method="post" action="/evolution/recalculate" class="d-inline">
        <button type="submit" class="btn btn-primary">
            <i class="bi bi-arrow-clockwise"></i> Recalcular
        </button>
    </form>
</div>

<div th:if="${months.isEmpty()}" class="card border-0 shadow-sm">
    <div class="card-body text-center py-5 text-muted">
        <i class="bi bi-inbox fs-1"></i>
        <p class="mt-2">Nenhum dado de evolução encontrado.</p>
        <p class="small">Clique em "Recalcular" para gerar os snapshots mensais.</p>
    </div>
</div>

<div th:if="${!months.isEmpty()}" class="card border-0 shadow-sm">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-hover table-sm mb-0 align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Mês</th>
                        <th class="text-end">Total Investido</th>
                        <th class="text-end">Valor de Mercado</th>
                        <th class="text-end">Resultado</th>
                        <th class="text-end">Dividendos no Mês</th>
                        <th class="text-end">Dividendos Acumulados</th>
                        <th th:each="ticker : ${tickers}" class="text-end" th:text="${ticker}"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="row : ${months}">
                        <td>
                            <span th:text="${#temporals.format(row.month, 'MM/yyyy')}"></span>
                        </td>
                        <td class="text-end">
                            R$ <span th:text="${#numbers.formatDecimal(row.totalInvested, 1, 2)}"></span>
                        </td>
                        <td class="text-end">
                            R$ <span th:text="${#numbers.formatDecimal(row.totalMarketValue, 1, 2)}"></span>
                        </td>
                        <td class="text-end"
                            th:with="result=${row.totalMarketValue - row.totalInvested}"
                            th:classappend="${result >= 0} ? 'text-success' : 'text-danger'">
                            R$ <span th:text="${#numbers.formatDecimal(result, 1, 2)}"></span>
                        </td>
                        <td class="text-end">
                            R$ <span th:text="${#numbers.formatDecimal(row.totalMonthlyNetDividends, 1, 2)}"></span>
                        </td>
                        <td class="text-end">
                            R$ <span th:text="${#numbers.formatDecimal(row.totalAccumulatedNetDividends, 1, 2)}"></span>
                        </td>
                        <th:block th:each="ticker : ${tickers}">
                            <td class="text-end"
                                th:with="snap=${row.snapshots.^[assetId == #vars.ticker]}">
                                <span th:if="${snap != null}">
                                    R$ <span th:text="${#numbers.formatDecimal(snap.marketValue, 1, 2)}"></span>
                                    <br><small class="text-muted"
                                        th:text="${#numbers.formatDecimal(snap.quantity, 1, 0)} + ' × R$ ' + ${#numbers.formatDecimal(snap.marketPrice, 1, 2)}"></small>
                                </span>
                                <span th:if="${snap == null}" class="text-muted">—</span>
                            </td>
                        </th:block>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</div>

<th:block th:replace="~{base :: scripts}"></th:block>
</body>
</html>
