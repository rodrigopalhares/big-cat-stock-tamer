spring:
  application:
    name: stocks

  datasource:
    url: jdbc:h2:file:./data/stocks;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    deserialization:
      fail-on-null-for-primitives: false

  thymeleaf:
    cache: false

server:
  port: 8000
