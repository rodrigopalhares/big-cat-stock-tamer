spring:
  application:
    name: stocks

  datasource:
    url: jdbc:h2:file:${app.data-dir}/stocks;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    deserialization:
      fail-on-null-for-primitives: false

  thymeleaf:
    cache: false

exposed:
  show-sql: true

logging:
  level:
    Exposed: INFO

server:
  port: 8000

app:
  # Diretório base de dados (banco H2 + arquivo de sessão). Default: ./data
  data-dir: ${APP_DATA_DIR:./data}

  # Autenticação simples de usuário único.
  # A senha é lida da variável de ambiente APP_AUTH_PASSWORD (ver .env).
  # Se ficar em branco, a autenticação é desabilitada.
  auth:
    password: ${APP_AUTH_PASSWORD:}
    key-file: ${APP_AUTH_KEY_FILE:${app.data-dir}/auth.key}
    session-days: ${APP_AUTH_SESSION_DAYS:365}
